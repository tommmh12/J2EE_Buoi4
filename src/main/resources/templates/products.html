<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/products">Products</a>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="text-danger fw-bold">XÂY DỰNG ỨNG DỤNG VỚI VALIDATION</h2>
    <hr>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header" th:text="${isEdit} ? 'Cập nhật sản phẩm' : 'Tạo sản phẩm mới'"></div>
                <div class="card-body">
                    <form th:action="${isEdit} ? @{/products/{id}(id=${productForm.id})} : @{/products}"
                          th:object="${productForm}"
                          method="post"
                          enctype="multipart/form-data">

                        <div class="mb-3">
                            <label class="form-label">Tên</label>
                            <input type="text" class="form-control" th:field="*{name}">
                            <div class="text-danger small" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Giá</label>
                            <input type="number" class="form-control" th:field="*{price}">
                            <div class="text-danger small" th:errors="*{price}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Hình ảnh</label>
                            <input type="file" class="form-control" th:field="*{imageFile}" accept="image/*">
                            <div class="text-danger small" th:errors="*{imageFile}"></div>
                            <div class="mt-2" th:if="${isEdit} and ${productForm.existingImageUrl}">
                                <img th:src="${productForm.existingImageUrl}" alt="preview" width="80">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Danh mục</label>
                            <select class="form-select" th:field="*{category}">
                                <option value="">-- Chọn danh mục --</option>
                                <option th:each="category : ${categories}"
                                        th:value="${category}"
                                        th:text="${category.displayName}"></option>
                            </select>
                            <div class="text-danger small" th:errors="*{category}"></div>
                        </div>

                        <button type="submit" class="btn btn-success" th:text="${isEdit} ? 'Cập nhật' : 'Thêm sản phẩm'"></button>
                        <a th:if="${isEdit}" href="/products" class="btn btn-secondary ms-2">Hủy</a>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card">
                <div class="card-header">Danh sách sản phẩm</div>
                <div class="card-body p-0">
                    <table class="table table-striped mb-0">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Tên</th>
                            <th>Giá</th>
                            <th>Hình ảnh</th>
                            <th>Danh mục</th>
                            <th>Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="6" class="text-center text-muted">Chưa có sản phẩm</td>
                        </tr>
                        <tr th:each="product : ${products}">
                            <td th:text="${product.id}"></td>
                            <td th:text="${product.name}"></td>
                            <td th:text="${product.price}"></td>
                            <td>
                                <img th:if="${product.imageUrl}" th:src="${product.imageUrl}" alt="image" width="70">
                            </td>
                            <td th:text="${product.category.displayName}"></td>
                            <td class="d-flex gap-2">
                                <a class="btn btn-sm btn-secondary" th:href="@{/products/{id}/edit(id=${product.id})}">Edit</a>
                                <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
